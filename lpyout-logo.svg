<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- lpyout logo: a screen subdivided into a grid layout, Python yellow-to-blue gradient -->

  <defs>
    <linearGradient id="pyGradient" gradientUnits="userSpaceOnUse" x1="36" y1="126" x2="128" y2="34">
      <stop offset="0%" stop-color="#FFD43B"/>
      <stop offset="100%" stop-color="#306998"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="152" height="152" rx="28" fill="#2B2118"/>

  <!-- outer screen bounds, matching the grid box used across the other logos -->
  <rect x="36" y="34" width="92" height="92" rx="4" fill="none" stroke="#6B5B4E" stroke-width="2"/>

  <!-- layout regions -->
  <rect x="40" y="38" width="20" height="84" rx="3" fill="url(#pyGradient)" opacity="0.85"/>
  <rect x="64" y="38" width="60" height="24" rx="3" fill="url(#pyGradient)" opacity="0.55"/>
  <rect x="64" y="66" width="60" height="56" rx="3" fill="url(#pyGradient)" opacity="0.3"/>
</svg>
